<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>🎵 Müzik</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif; user-select:none; }
        body { background:#000; color:#fff; min-height:100vh; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        ::-webkit-scrollbar { display:none; }
        .header { padding:60px 24px 16px; background:linear-gradient(180deg,rgba(20,20,20,1)0%,rgba(0,0,0,0)100%); position:sticky; top:0; z-index:50; }
        .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
        .header h1 { font-size:36px; font-weight:800; letter-spacing:-0.5px; }
        .add-btn { width:32px; height:32px; border-radius:50%; background:rgba(252,60,68,0.2); border:none; color:#fc3c44; font-size:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .add-btn:active { transform:scale(0.9); background:rgba(252,60,68,0.4); }
        .header-stats { font-size:13px; color:#8e8e93; font-weight:500; }
        .search-container { padding:0 24px 16px; }
        .search-bar { background:rgba(255,255,255,0.08); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:10px; }
        .search-bar svg { width:18px; height:18px; fill:#8e8e93; }
        .search-bar input { background:none; border:none; color:#fff; font-size:16px; width:100%; outline:none; }
        .search-bar input::placeholder { color:#8e8e93; }
        .tab-content-area { flex:1; overflow-y:auto; padding-bottom:160px; display:none; }
        .tab-content-area.active { display:block; }
        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; text-align:center; padding:20px; }
        .empty-state .icon { font-size:64px; margin-bottom:16px; opacity:0.5; }
        .empty-state h3 { font-size:20px; font-weight:700; margin-bottom:8px; }
        .empty-state p { font-size:15px; color:#8e8e93; line-height:1.4; }
        .song-list { padding:0 0 20px; }
        .song-item { display:flex; align-items:center; padding:12px 24px; gap:14px; cursor:pointer; transition:background 0.2s; animation:fadeIn 0.4s ease forwards; opacity:0; }
        .song-item:active { background:rgba(255,255,255,0.05); }
        .song-item.active { background:rgba(252,60,68,0.1); }
        .song-item.active .song-title { color:#fc3c44; }
        .song-number { width:24px; text-align:center; font-size:16px; color:#8e8e93; font-weight:500; }
        .song-item.active .song-number { display:none; }
        .song-item.active .playing-icon { display:block; width:24px; text-align:center; color:#fc3c44; }
        .playing-icon { display:none; }
        .song-art { width:48px; height:48px; border-radius:8px; background:linear-gradient(135deg,#333,#111); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
        .disc { width:100%; height:100%; border-radius:50%; background:conic-gradient(from 0deg,#222 0deg 25deg,#555 25deg 30deg,#222 30deg 85deg,#555 85deg 90deg,#222 90deg 145deg,#555 145deg 150deg,#222 150deg 205deg,#555 205deg 210deg,#222 210deg 265deg,#555 265deg 270deg,#222 270deg 325deg,#555 325deg 330deg,#222 330deg 360deg); display:flex; align-items:center; justify-content:center; animation:spin 3s linear infinite; animation-play-state:paused; }
        .disc.playing { animation-play-state:running; }
        .disc::before { content:''; width:35%; height:35%; border-radius:50%; background:#000; border:2px solid #444; }
        .song-details { flex:1; min-width:0; }
        .song-title { font-size:16px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
        .song-artist { font-size:13px; color:#8e8e93; }
        .song-more-btn { background:none; border:none; color:#8e8e93; font-size:20px; padding:8px; cursor:pointer; }
        .albums-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding:0 24px; }
        .album-card { display:flex; flex-direction:column; gap:8px; cursor:pointer; animation:fadeIn 0.4s ease forwards; opacity:0; }
        .album-card:active { opacity:0.7; }
        .album-cover { width:100%; aspect-ratio:1/1; border-radius:12px; background:linear-gradient(135deg,#222,#444); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        .album-cover .disc { width:85%; height:85%; }
        .album-info { padding:0 4px; }
        .album-title { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .album-artist { font-size:13px; color:#8e8e93; }
        .mini-player { position:fixed; bottom:84px; left:12px; right:12px; height:64px; background:rgba(40,40,40,0.95); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-radius:14px; display:flex; align-items:center; padding:0 12px; gap:12px; z-index:90; cursor:pointer; transition:all 0.3s cubic-bezier(0.2,0.8,0.2,1); opacity:0; transform:translateY(20px); pointer-events:none; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
        .mini-player.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
        .mini-player-art { width:44px; height:44px; border-radius:8px; background:linear-gradient(135deg,#fc3c44,#ff6b6b); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .mini-player-art .disc { width:100%; height:100%; }
        .mini-player-info { flex:1; min-width:0; }
        .mini-player-title { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mini-player-artist { font-size:12px; color:#8e8e93; }
        .mini-player-controls { display:flex; align-items:center; gap:4px; }
        .mini-ctrl-btn { background:none; border:none; color:#fff; padding:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .mini-ctrl-btn svg { width:24px; height:24px; fill:currentColor; }
        .tab-bar { position:fixed; bottom:0; left:0; right:0; height:84px; background:rgba(0,0,0,0.9); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-top:0.5px solid rgba(255,255,255,0.15); display:flex; justify-content:space-around; padding-top:10px; z-index:100; }
        .tab-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:0 20px; transition:opacity 0.2s; }
        .tab-item:active { opacity:0.6; }
        .tab-item svg { width:24px; height:24px; fill:#8e8e93; transition:fill 0.2s; }
        .tab-item span { font-size:10px; color:#8e8e93; font-weight:500; transition:color 0.2s; }
        .tab-item.active svg { fill:#fc3c44; }
        .tab-item.active span { color:#fc3c44; }
        .full-player-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg,#1a1a1a 0%,#000 100%); z-index:200; transform:translateY(100%); transition:transform 0.45s cubic-bezier(0.32,0.72,0,1); display:flex; flex-direction:column; align-items:center; }
        .full-player-overlay.open { transform:translateY(0); }
        .full-player-header { width:100%; padding:20px 24px; display:flex; justify-content:center; align-items:center; position:relative; }
        .full-player-handle { width:36px; height:5px; background:rgba(255,255,255,0.2); border-radius:3px; margin-bottom:20px; }
        .full-player-close { position:absolute; left:24px; background:none; border:none; color:#fff; font-size:18px; cursor:pointer; padding:8px; display:flex; align-items:center; justify-content:center; }
        .full-player-close svg { width:24px; height:24px; fill:#fff; }
        .full-player-art-container { flex:1; display:flex; align-items:center; justify-content:center; width:100%; padding:0 32px; }
        .full-player-art { width:100%; max-width:320px; aspect-ratio:1/1; border-radius:16px; background:linear-gradient(135deg,#fc3c44,#ff6b6b,#ffa07a); display:flex; align-items:center; justify-content:center; box-shadow:0 20px 50px rgba(252,60,68,0.3); position:relative; overflow:hidden; }
        .full-player-art .disc { width:85%; height:85%; background:conic-gradient(from 0deg,#111 0deg 25deg,#444 25deg 30deg,#111 30deg 85deg,#444 85deg 90deg,#111 90deg 145deg,#444 145deg 150deg,#111 150deg 205deg,#444 205deg 210deg,#111 210deg 265deg,#444 265deg 270deg,#111 270deg 325deg,#444 325deg 330deg,#111 330deg 360deg); animation:spin 4s linear infinite; animation-play-state:paused; }
        .full-player-art .disc.playing { animation-play-state:running; }
        .full-player-art .disc::before { content:''; width:30%; height:30%; border-radius:50%; background:#000; border:4px solid #333; }
        .full-player-info { width:100%; padding:32px 32px 24px; display:flex; justify-content:space-between; align-items:flex-end; }
        .full-player-details { min-width:0; }
        .full-player-title { font-size:22px; font-weight:700; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .full-player-artist { font-size:18px; color:#8e8e93; font-weight:500; }
        .full-player-progress { width:100%; padding:0 32px 24px; }
        .progress-bar-bg { width:100%; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; cursor:pointer; margin-bottom:8px; position:relative; }
        .progress-bar-fill { height:100%; background:#fff; border-radius:2px; width:0%; position:relative; }
        .progress-bar-fill::after { content:''; position:absolute; right:-6px; top:-4px; width:12px; height:12px; background:#fff; border-radius:50%; opacity:0; transition:opacity 0.2s; }
        .progress-bar-bg:active .progress-bar-fill::after { opacity:1; }
        .time-row { display:flex; justify-content:space-between; font-size:12px; color:#8e8e93; font-weight:500; }
        .full-player-controls { width:100%; padding:0 32px 40px; display:flex; align-items:center; justify-content:space-between; }
        .ctrl-btn { background:none; border:none; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:10px; transition:transform 0.1s; }
        .ctrl-btn:active { transform:scale(0.9); }
        .ctrl-btn svg { fill:currentColor; }
        .ctrl-small svg { width:22px; height:22px; }
        .ctrl-small { color:#8e8e93; }
        .ctrl-small.active { color:#fff; }
        .ctrl-play { width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,0.15); backdrop-filter:blur(10px); }
        .ctrl-play svg { width:32px; height:32px; fill:#fff; }
        .ctrl-skip svg { width:32px; height:32px; }
        .volume-container { width:100%; padding:0 32px 60px; display:flex; align-items:center; gap:12px; }
        .volume-container svg { width:16px; height:16px; fill:#8e8e93; }
        .volume-slider { flex:1; -webkit-appearance:none; appearance:none; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; outline:none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:#fff; border-radius:50%; cursor:pointer; }
        .menu-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:300; opacity:0; visibility:hidden; transition:all 0.3s; }
        .menu-overlay.open { opacity:1; visibility:visible; }
        .bottom-sheet { position:fixed; bottom:0; left:0; right:0; background:rgba(30,30,30,0.98); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-radius:20px 20px 0 0; z-index:301; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.32,0.72,0,1); padding:24px 24px 40px; }
        .bottom-sheet.open { transform:translateY(0); }
        .sheet-handle { width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:3px; margin:0 auto 24px; }
        .sheet-title { text-align:center; font-size:18px; font-weight:700; margin-bottom:24px; }
        .menu-item { display:flex; align-items:center; gap:16px; padding:16px 0; border-bottom:0.5px solid rgba(255,255,255,0.1); cursor:pointer; }
        .menu-item:last-child { border-bottom:none; }
        .menu-item:active { opacity:0.6; }
        .menu-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .menu-icon.blue { background:rgba(0,122,255,0.2); }
        .menu-icon.green { background:rgba(52,199,89,0.2); }
        .menu-icon.red { background:rgba(255,59,48,0.2); }
        .menu-icon.purple { background:rgba(175,82,222,0.2); }
        .menu-text { font-size:16px; font-weight:500; }
        .confirm-dialog { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:400; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:all 0.2s; }
        .confirm-dialog.open { opacity:1; visibility:visible; }
        .confirm-box { background:rgba(40,40,40,0.95); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-radius:16px; width:85%; max-width:300px; text-align:center; overflow:hidden; transform:scale(0.9); transition:transform 0.2s; }
        .confirm-dialog.open .confirm-box { transform:scale(1); }
        .confirm-body { padding:24px; }
        .confirm-body h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
        .confirm-body p { font-size:14px; color:#8e8e93; line-height:1.4; }
        .confirm-actions { display:flex; border-top:0.5px solid rgba(255,255,255,0.15); }
        .confirm-btn { flex:1; padding:16px; border:none; background:none; font-size:16px; font-weight:600; cursor:pointer; }
        .confirm-btn.cancel { color:#fff; border-right:0.5px solid rgba(255,255,255,0.15); }
        .confirm-btn.delete { color:#ff3b30; }
        .confirm-btn:active { background:rgba(255,255,255,0.1); }
        .loading-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:all 0.2s; }
        .loading-overlay.open { opacity:1; visibility:visible; }
        .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.1); border-top-color:#fc3c44; border-radius:50%; animation:spin 0.8s linear infinite; }
        .toast { position:fixed; bottom:200px; left:50%; transform:translateX(-50%) translateY(30px); background:rgba(50,50,50,0.95); color:#fff; padding:12px 24px; border-radius:24px; font-size:15px; z-index:600; opacity:0; transition:all 0.3s; backdrop-filter:blur(20px); white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        #fileInput, #folderInput { display:none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top"><h1>Müzik</h1><button class="add-btn" id="addBtn">+</button></div>
        <div class="header-stats" id="headerStats">Şarkı eklemek için + butonuna dokunun</div>
    </div>
    <div class="search-container">
        <div class="search-bar">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" placeholder="Şarkı ara">
        </div>
    </div>
    <div class="tab-content-area active" id="listenView">
        <div class="empty-state" id="emptyState"><div class="icon"></div><h3>Müzik Kütüphaneniz Boş</h3><p>M4A dosyalarınızı ekleyerek<br>müzik dinlemeye başlayın</p></div>
        <div class="song-list" id="songList"></div>
    </div>
    <div class="tab-content-area" id="albumsView">
        <div class="albums-grid" id="albumsGrid"></div>
    </div>
    <div class="mini-player" id="miniPlayer">
        <div class="mini-player-art"><div class="disc" id="miniDisc"></div></div>
        <div class="mini-player-info"><div class="mini-player-title" id="miniTitle">Şarkı seçin</div><div class="mini-player-artist" id="miniArtist">-</div></div>
        <div class="mini-player-controls">
            <button class="mini-ctrl-btn" id="miniPrev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="mini-ctrl-btn" id="miniPlay"><svg viewBox="0 0 24 24" id="miniPlayIcon"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="mini-ctrl-btn" id="miniNext"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab-item active" data-tab="listen"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg><span>Dinle</span></div>
        <div class="tab-item" data-tab="albums"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg><span>Albümler</span></div>
    </div>
    <div class="full-player-overlay" id="fullPlayer">
        <div class="full-player-header"><div class="full-player-handle"></div><button class="full-player-close" id="fullClose"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></button></div>
        <div class="full-player-art-container"><div class="full-player-art"><div class="disc" id="fullDisc"></div></div></div>
        <div class="full-player-info"><div class="full-player-details"><div class="full-player-title" id="fullTitle">Şarkı seçin</div><div class="full-player-artist" id="fullArtist">-</div></div></div>
        <div class="full-player-progress"><div class="progress-bar-bg" id="progressWrap"><div class="progress-bar-fill" id="progressBar"></div></div><div class="time-row"><span id="curTime">0:00</span><span id="totTime">0:00</span></div></div>
        <div class="full-player-controls">
            <button class="ctrl-btn ctrl-small" id="shuffleBtn"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
            <button class="ctrl-btn ctrl-skip" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="ctrl-btn ctrl-play" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="ctrl-btn ctrl-skip" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            <button class="ctrl-btn ctrl-small" id="repeatBtn"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>
        <div class="volume-container">
            <svg viewBox="0 0 24 24"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg>
            <input type="range" class="volume-slider" id="volSlider" min="0" max="100" value="80">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4l-5 5H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>
    </div>
    <div class="menu-overlay" id="addOverlay"></div>
    <div class="bottom-sheet" id="addMenu">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Menü</div>
        <div class="menu-item" id="menuAddFiles"><div class="menu-icon blue">📁</div><div class="menu-text">Dosya Seç</div></div>
        <div class="menu-item" id="menuFolder"><div class="menu-icon green">📂</div><div class="menu-text">Klasörden Seç</div></div>
        <div class="menu-item" id="menuExport"><div class="menu-icon purple">📥</div><div class="menu-text">Müzikleri İndir</div></div>
        <div class="menu-item" id="menuClearAll"><div class="menu-icon red">🗑️</div><div class="menu-text">Tümünü Sil</div></div>
    </div>
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-box">
            <div class="confirm-body"><h3 id="confirmTitle">Emin misiniz?</h3><p id="confirmMsg">Bu işlem geri alınamaz.</p></div>
            <div class="confirm-actions"><button class="confirm-btn cancel" id="confirmCancel">İptal</button><button class="confirm-btn delete" id="confirmDelete">Sil</button></div>
        </div>
    </div>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" accept="audio/*,.m4a,.mp4,.aac" multiple>
    <input type="file" id="folderInput" accept="audio/*,.m4a,.mp4,.aac" multiple webkitdirectory>
    <audio id="audio"></audio>

    <script>
        const DB_NAME='AppleMusicDB', STORE_NAME='songs'; let db;
        function initDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE_NAME))e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'});};r.onsuccess=e=>{db=e.target.result;res();};r.onerror=e=>rej(e.target.error);});}
        function addSongToDB(s){return new Promise((res,rej)=>{const t=db.transaction(STORE_NAME,'readwrite');t.objectStore(STORE_NAME).put(s);t.oncomplete=()=>res();t.onerror=e=>rej(e.target.error);});}
        function getAllSongs(){return new Promise((res,rej)=>{const t=db.transaction(STORE_NAME,'readonly');const r=t.objectStore(STORE_NAME).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
        function deleteSongFromDB(id){return new Promise((res,rej)=>{const t=db.transaction(STORE_NAME,'readwrite');t.objectStore(STORE_NAME).delete(id);t.oncomplete=()=>res();t.onerror=e=>rej(e.target.error);});}
        function clearAllSongs(){return new Promise((res,rej)=>{const t=db.transaction(STORE_NAME,'readwrite');t.objectStore(STORE_NAME).clear();t.oncomplete=()=>res();t.onerror=e=>rej(e.target.error);});}

        let songs=[], currentIndex=-1, isPlaying=false, isShuffle=false, repeatMode=0, shuffleOrder=[], currentBlobUrl=null;

        const audio=document.getElementById('audio'), miniPlayer=document.getElementById('miniPlayer'), miniDisc=document.getElementById('miniDisc'), miniTitle=document.getElementById('miniTitle'), miniArtist=document.getElementById('miniArtist'), miniPlayIcon=document.getElementById('miniPlayIcon'), fullPlayer=document.getElementById('fullPlayer'), fullDisc=document.getElementById('fullDisc'), fullTitle=document.getElementById('fullTitle'), fullArtist=document.getElementById('fullArtist'), progressWrap=document.getElementById('progressWrap'), progressBar=document.getElementById('progressBar'), curTime=document.getElementById('curTime'), totTime=document.getElementById('totTime'), playBtn=document.getElementById('playBtn'), playIcon=document.getElementById('playIcon'), volSlider=document.getElementById('volSlider'), listenView=document.getElementById('listenView'), albumsView=document.getElementById('albumsView'), songList=document.getElementById('songList'), albumsGrid=document.getElementById('albumsGrid'), emptyState=document.getElementById('emptyState'), headerStats=document.getElementById('headerStats'), searchInput=document.getElementById('searchInput'), addOverlay=document.getElementById('addOverlay'), addMenu=document.getElementById('addMenu'), confirmDialog=document.getElementById('confirmDialog'), loading=document.getElementById('loading'), toast=document.getElementById('toast');

        (async()=>{await initDB(); songs=await getAllSongs(); renderAll();})();

        function renderAll(){
            const q=searchInput.value.toLowerCase().trim();
            const filtered=songs.filter(s=>s.name.toLowerCase().includes(q));
            if(songs.length===0){emptyState.style.display='flex';headerStats.textContent='Şarkı eklemek için + butonuna dokunun';}
            else{emptyState.style.display='none';headerStats.textContent=`${songs.length} şarkı`;}
            miniPlayer.classList.toggle('visible', currentIndex>=0);
            songList.innerHTML=''; filtered.forEach((s,i)=>{const ri=songs.indexOf(s);const act=ri===currentIndex;const el=document.createElement('div');el.className=`song-item ${act?'active':''}`;el.style.animationDelay=`${i*0.05}s`;el.innerHTML=`<div class="song-number">${i+1}</div><div class="playing-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fc3c44"><path d="M8 5v14l11-7z"/></svg></div><div class="song-art"><div class="disc ${act&&isPlaying?'playing':''}" style="background:linear-gradient(135deg,hsl(${ri*45},60%,40%),hsl(${ri*45+40},70%,60%))"></div></div><div class="song-details" data-index="${ri}"><div class="song-title">${s.name}</div><div class="song-artist">Yerel Müzik</div></div><button class="song-more-btn" data-index="${ri}">⋯</button>`;el.querySelector('.song-details').onclick=()=>{if(act)togglePlay();else playSong(ri);};el.querySelector('.song-more-btn').onclick=e=>{e.stopPropagation();showDeleteConfirm(ri);};songList.appendChild(el);});
            albumsGrid.innerHTML=''; filtered.forEach((s,i)=>{const ri=songs.indexOf(s);const act=ri===currentIndex;const el=document.createElement('div');el.className='album-card';el.style.animationDelay=`${i*0.06}s`;el.innerHTML=`<div class="album-cover" style="background:linear-gradient(135deg,hsl(${ri*45},60%,30%),hsl(${ri*45+40},70%,50%))"><div class="disc ${act&&isPlaying?'playing':''}"></div></div><div class="album-info"><div class="album-title">${s.name}</div><div class="album-artist">Yerel Müzik</div></div>`;el.onclick=()=>{if(act)togglePlay();else playSong(ri);};albumsGrid.appendChild(el);});
        }
        searchInput.addEventListener('input',renderAll);

        function playSong(idx){
            if(idx<0||idx>=songs.length)return; currentIndex=idx; const s=songs[idx];
            if(currentBlobUrl)URL.revokeObjectURL(currentBlobUrl);
            const blob=new Blob([s.data],{type:s.type||'audio/mp4'}); currentBlobUrl=URL.createObjectURL(blob); audio.src=currentBlobUrl;
            audio.play().then(()=>{isPlaying=true;updatePlayerUI();renderAll();}).catch(()=>{});
            miniTitle.textContent=s.name; fullTitle.textContent=s.name; fullArtist.textContent='Yerel Müzik'; miniArtist.textContent='Yerel Müzik';
            if('mediaSession'in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:'Yerel Müzik'});navigator.mediaSession.setActionHandler('play',resumeAudio);navigator.mediaSession.setActionHandler('pause',pauseAudio);navigator.mediaSession.setActionHandler('previoustrack',playPrev);navigator.mediaSession.setActionHandler('nexttrack',playNext);}
        }
        function togglePlay(){if(currentIndex===-1&&songs.length>0)return playSong(0);isPlaying?pauseAudio():resumeAudio();}
        function pauseAudio(){audio.pause();isPlaying=false;updatePlayerUI();renderAll();}
        function resumeAudio(){audio.play();isPlaying=true;updatePlayerUI();renderAll();}
        function playNext(){if(!songs.length)return;if(isShuffle){if(shuffleOrder.length!==songs.length)genShuffle();playSong(shuffleOrder[(shuffleOrder.indexOf(currentIndex)+1)%shuffleOrder.length]);}else playSong((currentIndex+1)%songs.length);}
        function playPrev(){if(!songs.length)return;if(audio.currentTime>3){audio.currentTime=0;return;}if(isShuffle){if(shuffleOrder.length!==songs.length)genShuffle();playSong(shuffleOrder[(shuffleOrder.indexOf(currentIndex)-1+shuffleOrder.length)%shuffleOrder.length]);}else playSong((currentIndex-1+songs.length)%songs.length);}
        function genShuffle(){shuffleOrder=songs.map((_,i)=>i);for(let i=shuffleOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffleOrder[i],shuffleOrder[j]]=[shuffleOrder[j],shuffleOrder[i]];}}
        function updatePlayerUI(){const p=isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';playIcon.innerHTML=p;miniPlayIcon.innerHTML=p;document.querySelectorAll('.disc').forEach(d=>{if(isPlaying)d.classList.add('playing');else d.classList.remove('playing');});}

        audio.addEventListener('timeupdate',()=>{if(audio.duration){progressBar.style.width=`${(audio.currentTime/audio.duration)*100}%`;curTime.textContent=fmtTime(audio.currentTime);}});
        audio.addEventListener('loadedmetadata',()=>{totTime.textContent=fmtTime(audio.duration);});
        audio.addEventListener('ended',()=>{if(repeatMode===2){audio.currentTime=0;audio.play();}else if(repeatMode===1)playNext();else if(currentIndex<songs.length-1||isShuffle)playNext();else{isPlaying=false;updatePlayerUI();renderAll();}});

        playBtn.onclick=togglePlay; document.getElementById('miniPlay').onclick=e=>{e.stopPropagation();togglePlay();};
        document.getElementById('nextBtn').onclick=playNext; document.getElementById('prevBtn').onclick=playPrev;
        document.getElementById('miniNext').onclick=e=>{e.stopPropagation();playNext();}; document.getElementById('miniPrev').onclick=e=>{e.stopPropagation();playPrev();};
        document.getElementById('shuffleBtn').onclick=function(){isShuffle=!isShuffle;this.classList.toggle('active',isShuffle);if(isShuffle)genShuffle();showToast(isShuffle?'Karıştırma Açık':'Karıştırma Kapalı');};
        document.getElementById('repeatBtn').onclick=function(){repeatMode=(repeatMode+1)%3;this.classList.toggle('active',repeatMode>0);showToast(['Tekrar Kapalı','Tümünü Tekrarla','Birini Tekrarla'][repeatMode]);};

        function seekAudio(e){if(!audio.duration)return;const r=progressWrap.getBoundingClientRect();let x=e.clientX;if(e.touches&&e.touches.length>0)x=e.touches[0].clientX;let p=Math.max(0,Math.min(1,(x-r.left)/r.width));audio.currentTime=p*audio.duration;}
        progressWrap.onclick=seekAudio; progressWrap.ontouchstart=seekAudio; progressWrap.ontouchmove=seekAudio;

        audio.volume=0.8; volSlider.oninput=e=>{audio.volume=e.target.value/100;}; volSlider.ontouchmove=e=>{e.stopPropagation();const r=e.target.getBoundingClientRect();let p=Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width));volSlider.value=p*100;audio.volume=p;};

        document.querySelectorAll('.tab-item').forEach(item=>{item.onclick=()=>{document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active'));item.classList.add('active');document.querySelectorAll('.tab-content-area').forEach(c=>c.classList.remove('active'));document.getElementById(item.dataset.tab+'View').classList.add('active');};});
        miniPlayer.onclick=()=>fullPlayer.classList.add('open'); document.getElementById('fullClose').onclick=()=>fullPlayer.classList.remove('open');

        document.getElementById('addBtn').onclick=()=>{addMenu.classList.add('open');addOverlay.classList.add('open');};
        function closeAdd(){addMenu.classList.remove('open');addOverlay.classList.remove('open');}
        addOverlay.onclick=closeAdd;
        document.getElementById('menuAddFiles').onclick=()=>{closeAdd();document.getElementById('fileInput').click();};
        document.getElementById('menuFolder').onclick=()=>{closeAdd();document.getElementById('folderInput').click();};
        
        // 📥 YENİ: Müzikleri İndir Fonksiyonu
        document.getElementById('menuExport').onclick=async()=>{
            closeAdd();
            const all=await getAllSongs();
            if(all.length===0)return showToast('İndirilecek şarkı yok');
            loading.classList.add('open');
            for(let i=0;i<all.length;i++){
                const s=all[i]; const blob=new Blob([s.data],{type:s.type||'audio/mp4'});
                const url=URL.createObjectURL(blob); const a=document.createElement('a');
                a.href=url; a.download=s.fileName||(s.name+'.m4a'); document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);
                await new Promise(r=>setTimeout(r,800)); // iOS indirme limiti için bekleme
            }
            loading.classList.remove('open');
            showToast('İndirme tamamlandı! "Dosyalar" uygulamasını kontrol et.');
        };

        document.getElementById('menuClearAll').onclick=()=>{closeAdd();if(!songs.length)return showToast('Kütüphane zaten boş');document.getElementById('confirmTitle').textContent='Tümünü Sil';document.getElementById('confirmMsg').textContent=`${songs.length} şarkı kalıcı silinecek.`;document.getElementById('confirmDelete').onclick=async()=>{closeConfirm();loading.classList.add('open');await clearAllSongs();songs=[];currentIndex=-1;isPlaying=false;audio.pause();audio.src='';if(currentBlobUrl)URL.revokeObjectURL(currentBlobUrl);miniPlayer.classList.remove('visible');fullPlayer.classList.remove('open');loading.classList.remove('open');renderAll();showToast('Tüm şarkılar silindi');};confirmDialog.classList.add('open');};

        document.getElementById('fileInput').onchange=e=>{handleFiles(e.target.files);e.target.value='';};
        document.getElementById('folderInput').onchange=e=>{handleFiles(e.target.files);e.target.value='';};
        async function handleFiles(files){
            const audios=Array.from(files).filter(f=>{const ext=f.name.split('.').pop().toLowerCase();return f.type.startsWith('audio/')||['m4a','mp4','aac','mp3','wav','ogg','flac'].includes(ext);});
            if(!audios.length)return showToast('Geçerli ses dosyası bulunamadı');
            loading.classList.add('open');let added=0;
            for(const f of audios){const id=f.name+'_'+f.size+'_'+f.lastModified;if(songs.some(s=>s.id===id))continue;try{const buf=await f.arrayBuffer();await addSongToDB({id,name:f.name.replace(/\.[^/.]+$/,''),fileName:f.name,type:f.type,size:f.size,data:buf,dateAdded:Date.now()});songs.push({id,name:f.name.replace(/\.[^/.]+$/,''),size:f.size,type:f.type,data:buf});added++;}catch(e){console.error(e);}}
            loading.classList.remove('open');renderAll();showToast(`${added} şarkı eklendi`);
        }

        function showDeleteConfirm(idx){const s=songs[idx];document.getElementById('confirmTitle').textContent='Şarkıyı Sil';document.getElementById('confirmMsg').textContent=`"${s.name}" silinecek.`;document.getElementById('confirmDelete').onclick=async()=>{closeConfirm();await deleteSongFromDB(s.id);songs.splice(idx,1);if(idx===currentIndex){currentIndex=-1;isPlaying=false;audio.pause();audio.src='';miniPlayer.classList.remove('visible');fullPlayer.classList.remove('open');}else if(idx<currentIndex)currentIndex--;renderAll();showToast('Şarkı silindi');};confirmDialog.classList.add('open');}
        function closeConfirm(){confirmDialog.classList.remove('open');}
        document.getElementById('confirmCancel').onclick=closeConfirm;

        function fmtTime(s){if(isNaN(s))return '0:00';const m=Math.floor(s/60);return `${m}:${Math.floor(s%60).toString().padStart(2,'0')}`;}
        function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),2500);}

        if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW aktif ✅')).catch(()=>{});});}
    </script>
</body>
</html>
